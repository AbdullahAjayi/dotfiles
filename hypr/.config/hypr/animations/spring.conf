animations {
    enabled = yes

    # Premium bouncy curves
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = natural_spring, 0.1, 1.15, 0.1, 1.0
    bezier = bounce_pop, 0.2, 1.35, 0.2, 1.0
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    # Windows bounce in from a medium scale with a natural Apple-like spring
    animation = windows, 1, 4, fluent_decel, slide
    animation = windowsIn, 1, 5, natural_spring, popin 50%
    animation = windowsOut, 1, 3, fluent_decel, popin 80%
    
    # Smooth opacity fade when elements appear
    animation = fadeIn, 1, 7, fluent_decel
    animation = fadeOut, 1, 2.5, fluent_decel
    animation = fade, 1, 3, fluent_decel
    
    # Menus and notifications bounce in
    animation = layersIn, 1, 5, bounce_pop, popin 50%
    
    # Workspaces slide with a tiny bit of spring
    animation = workspaces, 1, 5, natural_spring, slide
    animation = specialWorkspace, 1, 5, natural_spring, slidevert
}
