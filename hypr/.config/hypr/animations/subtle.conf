animations {
    enabled = yes

    # High-end, smooth cubic-bezier curves
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = soft_pop, 0.1, 1.1, 0.3, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    # Smooth window dynamics
    animation = windows, 1, 3, fluent_decel, slide
    animation = windowsIn, 1, 3, soft_pop, popin 70%
    animation = windowsOut, 1, 3, fluent_decel, popin 80%
    animation = fadeIn, 1, 7, fluent_decel
    animation = fadeOut, 1, 2.5, fluent_decel
    animation = fade, 1, 3, fluent_decel
    
    # Ultra-smooth workspace transitions
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    animation = specialWorkspace, 1, 3, fluent_decel, slidevert
}
