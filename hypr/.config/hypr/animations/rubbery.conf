animations {
    enabled = yes

    # Authentic heavy rubber physics
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = thick_rubber, 0.4, 1.25, 0.1, 1.0
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    # Windows stretch in like a heavy rubber band
    animation = windows, 1, 4, fluent_decel, slide
    animation = windowsIn, 1, 5, thick_rubber, popin 40%
    animation = windowsOut, 1, 3, fluent_decel, popin 80%
    
    # Smooth opacity fade
    animation = fadeIn, 1, 7, fluent_decel
    animation = fadeOut, 1, 2.5, fluent_decel
    animation = fade, 1, 3, fluent_decel
    
    # Menus and notifications stretch in
    animation = layersIn, 1, 5, thick_rubber, popin 40%
    
    # Workspaces stretch when sliding
    animation = workspaces, 1, 5, thick_rubber, slide
    animation = specialWorkspace, 1, 5, thick_rubber, slidevert
}
