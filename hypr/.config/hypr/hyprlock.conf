# Hyprlock Configuration - Dynamic Colors from Wallpaper

# Source dynamic colors generated from wallpaper
source = ~/.config/hypr/themes/hyprlock-colors.conf

# General settings
general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

# Background
background {
    monitor =
    path = $HOME/.cache/wal/wal_wallpaper.jpg
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Input field (password)
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    
    outer_color = $foreground
    inner_color = $background
    font_color = $foreground
    
    fade_on_empty = false
    placeholder_text = Enter Password...
    
    position = 0, -120
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $foreground
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = $foreground
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    
    position = 0, 100
    halign = center
    valign = center
}

# User
label {
    monitor =
    text = Hi, $USER. It is time to add more value to the world!
    color = $foreground
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    
    position = 0, -200
    halign = center
    valign = center
}
